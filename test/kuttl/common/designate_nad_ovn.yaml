# Example NetworkAttachmentDefinition using OVN overlay
# All designate components (workers, mdns, bind9) use a single subnet
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: designate
  namespace: openstack
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "designate",
      "type": "ovn-k8s-cni-overlay",
      "topology": "layer2",
      "netAttachDefName": "openstack/designate",
      "subnets": "192.168.88.0/24"
    }
