// The current PODs bind9 address is set by the initcontainer.
// WARNING: if the required information is not available
// the bind service will be configured to listen to all IPv4
// addresses

// Allow rndc from any pod since traffic comes via Service (source IP is caller's pod IP)
// The rndc-key still provides authentication
controls {
        inet * port 953 allow { any; } keys { "rndc-key"; };
};
